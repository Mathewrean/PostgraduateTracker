<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PST - Postgraduate Submissions Tracker</title>
    <script>
      // Apply theme preference before the app renders to avoid flash
      (function() {
        try {
          var saved = localStorage.getItem('pst-theme')
          if (saved === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark')
          } else if (saved === 'light') {
            document.documentElement.removeAttribute('data-theme')
          } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark')
          }
        } catch (e) {
          // ignore
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
